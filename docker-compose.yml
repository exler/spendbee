services:
    spendbee:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: spendbee-app
        ports:
            - "3000:3000"
        environment:
            - PORT=3000
            - DATABASE_URL=/app/data/spendbee.db
            - BODY_SIZE_LIMIT=20M
        volumes:
            # Persistent volume for SQLite database
            - spendbee_data:/app/data
        env_file: .env
        restart: unless-stopped

    rustfs:
        image: rustfs/rustfs:latest
        container_name: spendbee-rustfs
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - rustfs_data:/data

    mailpit:
        image: axllent/mailpit
        container_name: spendbee-mailpit
        volumes:
            - mailpit_data:/data
        ports:
            - 8025:8025
            - 1025:1025
        environment:
            - MP_MAX_MESSAGES=5000
            - MP_DATA_FILE=/data/mailpit.db
            - MP_SMTP_AUTH_ACCEPT_ANY=true
            - MP_SMTP_AUTH_ALLOW_INSECURE=true

volumes:
    spendbee_data:
    rustfs_data:
    mailpit_data:
